<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h2>Forgot Password</h2>

<form id="forgotForm">

<input
type="email"
id="email"
placeholder="Enter Email"
required>

<button type="submit">

Send Reset Link

</button>

</form>

</div>

<script>

document
.getElementById(
"forgotForm"
)
.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

const res =
await fetch(

"http://localhost:5000/users/forgot-password",

{
method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({

email:
document.getElementById(
"email"
).value

})

}

);

const data =
await res.json();

alert(
data.message ||
data.error
);

});

</script>

</body>
</html>
