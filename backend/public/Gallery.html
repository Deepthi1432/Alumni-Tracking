<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-attachment: fixed;   /* scrolling effect */
      background-size: cover;         /* fills screen without stretching */
      background-position: center;    /* centers image */
      color: white;
    }
    header, main, footer, section {
      background: rgba(0,0,0,0.6); /* overlay for readability */
      padding: 20px;
      border-radius: 8px;
    }
    nav {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    nav a {
      color: white;
      text-decoration: none;
      padding: 8px 12px;
    }
    nav a:hover {
      background: #0066cc;
      border-radius: 4px;
    }
  </style>
  <header class="header">

    <div class="logo-container">

        <img src="https://upload.wikimedia.org/wikipedia/en/e/e3/Jawaharlal_Nehru_Technological_University%2C_Anantapur_logo.png"
        alt="JNTUA Logo"
        class="logo">

    </div>

    <div class="title-container">

        <h1>
            MASTER OF COMPUTER APPLICATIONS ALUMNI ASSOCIATION
        </h1>

        <p>
            Erstwhile Anantapur Engineering College (AEC) | JNTUACEA
        </p>

        <h3>
            ANECAA
        </h3>

    </div>

    <div class="logo-container">

        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSCjTJGmFOivb7fYptO4ggVUdu1gWvHzrj72A&s"
        alt="ANECAA Logo"
        class="logo">

    </div>

</header>
</head>
<body class="gallery">
  <header>
    <h1>Gallery</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="events.html">Events</a>
      <a href="gallery.html">Gallery</a>
      <a href="contact.html">Contact</a>
      <a href="committee.html">Committee</a>
      <a href="register.html">Register</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main>
    <h2>Photo Gallery</h2>
    <p>Browse memorable moments from alumni events and reunions.</p>
  </main>

  <footer>
    <p>&copy; MCA Alumni Association/JNTUACEA</p>
  </footer>
  <div id="bg-slider"></div>
<div
class="gallery-grid"
id="galleryGrid">
</div>
<script>

const images = [

"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhg_5mk-RMF3K5S7L0UxdGPSO4fko3MUUtAg&s",

"https://cse-five.vercel.app/static/media/cse.e9e75caa0c6bb2acec36.jpg",

"https://www.jntuacea.ac.in/assets/Hero%2018-DDBKdca-.png",

"https://www.jntuacea.ac.in/assets/Hero%2017-QwyKNV5o.png"

];

let current = 0;

const slider =
document.getElementById(
"bg-slider"
);

function changeBackground(){

    slider.style.backgroundImage =
    `url('${images[current]}')`;

    current =
    (current + 1) %
    images.length;

}

changeBackground();

setInterval(
changeBackground,
5000
);

</script>
<script>

async function loadGallery(){

const res =
await fetch(
"http://localhost:5000/gallery"
);

const images =
await res.json();

const grid =
document.getElementById(
"galleryGrid"
);

images.forEach(img=>{

grid.innerHTML += `

<div class="gallery-card">

<img
src="http://localhost:5000${img.imageUrl}"
alt="${img.title}">

<p>
${img.title}
</p>

</div>

`;

});

}

loadGallery();

</script>
</body>
</html>
